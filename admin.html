<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Admin — Nirvana Tribute</title>
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d0d0d;
      color: #ccc;
      font-family: 'Courier Prime', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      width: 100%;
      max-width: 380px;
      border: 1px solid #222;
      padding: 2.5rem 2rem;
      background: #111;
    }
    h1 {
      font-family: 'Special Elite', cursive;
      font-size: 1.4rem;
      color: #eee;
      margin-bottom: 0.3rem;
      letter-spacing: 0.06em;
    }
    .sub {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #444;
      margin-bottom: 2rem;
    }
    label {
      display: block;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 0.4rem;
    }
    input {
      display: block;
      width: 100%;
      background: #0d0d0d;
      border: 1px solid #2a2a2a;
      color: #ccc;
      font-family: 'Courier Prime', monospace;
      font-size: 0.9rem;
      padding: 0.65rem 0.8rem;
      margin-bottom: 1.2rem;
      outline: none;
      transition: border-color .2s;
    }
    input:focus { border-color: #c8a951; }
    button {
      width: 100%;
      background: #c8a951;
      color: #000;
      border: none;
      font-family: 'Special Elite', cursive;
      font-size: 0.95rem;
      letter-spacing: 0.1em;
      padding: 0.75rem;
      cursor: pointer;
      transition: opacity .2s;
    }
    button:hover { opacity: 0.85; }
    .error {
      margin-bottom: 1.2rem;
      padding: 0.65rem 0.8rem;
      border: 1px solid #5a1a1a;
      background: #1a0a0a;
      color: #c07070;
      font-size: 0.82rem;
    }
    .back {
      display: block;
      margin-top: 1.2rem;
      text-align: center;
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #444;
      text-decoration: none;
    }
    .back:hover { color: #c8a951; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Admin Access</h1>
    <div class="sub">Restricted Area</div>

   
     
   

    <form method="POST" action="/admin">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" autocomplete="off" required/>

      <label for="password">Password</label>
      <input type="password" id="password" name="password" required/>

      <button type="submit">Enter</button>
    </form>

    <a class="back" href="/">← Back to site</a>
  </div>
</body>
</html>
